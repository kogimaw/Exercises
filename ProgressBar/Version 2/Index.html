<!DOCTYPE html>
<html>
  <head>
    <title>Progress Bar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="main-menu">
      <div class="signup">
        <a href="#">Sign Up</a>
        <a href="#">Sign In</a>
      </div>
      <div class="main">
        
      </div>
      <a id="Play" href="">Play</a>
      <a id="Character" href="">Character</a>
      <a id="Shop" href="">Shop</a>
      <a id="Settings" href="">Settings</a>
    </div>

    <main>
      <div class="hud">
        <h1 id="level">Level: 1</h1>
        <div class="container">
          <!-- Main HUD -->
          <div class="progress-bar" data-stat='Health'>
            <p class="label">Health</p>
            <div class="bar">
              <div class="filler"></div>
              <p class="value">Loading</p>
            </div>
          </div>

          <div class="progress-bar" data-stat='Mana'>
            <p class="label">Mana</p>
            <div class="bar">
              <div class="filler"></div>
              <p class="value">Loading</p>
            </div>
          </div>

          <div class="progress-bar" data-stat='Exp'>
            <p class="label">Exp</p>
            <div class="bar">
              <div class="filler"></div>
              <p class="value">Loading</p>
            </div>
          </div>       
        <!-- END -->
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
