<!DOCTYPE html>
<html>
  <head>
    <title>Stopwatch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="stopwatch">
      <p class="textlabel">STOPWATCH</p>
      <div class="content">
        <div class="display">
          <p id="time">0:00:00.00</p>
        </div>
        <div class="record" id="record_container">
          
          
        </div>
        <div class="play" id="play">
          <button id="play_btn" type="button">Play</button>
          <button id="rec_btn" type="button">*</button>
          <button id='reset_btn' type="button">Reset</button>
        </div>
      </div>
    </div>
  <script src="script.js"></script>
  </body>
</html>
